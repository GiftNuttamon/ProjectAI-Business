version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=tni12345
      - N8N_PORT=5678
      - N8N_HOST=https://eugenie-unlicentious-allogenically.ngrok-free.dev
      - WEBHOOK_URL=https://eugenie-unlicentious-allogenically.ngrok-free.dev
      - TZ=Asia/Bangkok
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./local-files:/files
      - ./files:/files
    restart: always

  dashboard:
    image: nginx:alpine
    container_name: customer-dashboard
    ports:
      - "8080:80"
    volumes:
      - ./dashboard/public:/usr/share/nginx/html:ro
    restart: always
